<!DOCTYPE html>

<html>
    <head>
        <title>Appointment Lister</title>

        <style>
            body {
                background-color: burlywood;
                color: black;
                font-size: large;
                font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
                display: flex;
                padding: 40px;
            }
            input {
                background-color:azure;
                width: 100%;
                padding: 10px;
                margin-bottom: 10px;
                border: none;
                border-radius: 6px;
                outline: none;
            }
            button {
                background-color: beige;
                width: 100%;
                padding: 10px;
                border: none;
                border-radius: 6px;
            }
            button:hover {
                background-color: #f5e6c8;
            }
            #aptList p {
                background: rgba(43, 41, 41, 0.4);
                padding: 10px;
                border-radius: 8px;
                margin-top: 10px;
            }
            .info {
                color: white;
                font-size:x-large
            }
        </style>
    </head>

    <body>
        <h2>Create a appointment</h2>
        <form method="POST" action="/add">
            <input name="name" placeholder="Name"><br><br>
            <input name="date" placeholder="Date"><br><br>
            <input name="time" placeholder="Time"><br><br>
            <input name="reason" placeholder="Reason"><br><br>

            <button type="submit">Add</button><br><br>
        </form>
        
        <p class="info">Name     Date    Time    Reason</p>
        <div id="aptList"></div>

        <script>
            async function loadAppointments() {
                let res = await fetch('/api');
                let items = await res.json();

                let parent = document.getElementById('aptList');

                parent.innerHTML = "";

                items.forEach(item => {
                    let p = document.createElement('p');
                    p.innerText = item.name + " | " + item.date + " | " + item.time + " | " + item.reason + "  ";

                    let delBtn = document.createElement('button');
                    delBtn.innerText = "  Delete  ";
                    delBtn.onclick = async () => {
                        await fetch('/delete?name=' + item.name);
                        loadAppointments();
                    };

                    let updBtn = document.createElement('button');
                    updBtn.innerText = "  Update  ";
                    updBtn.onclick = async () => {
                        let newTime = prompt("Update time");
                        await fetch('/update?name=' + item.name + '&time=' + newTime);
                        loadAppointments();
                    };

                    p.appendChild(delBtn);
                    p.appendChild(updBtn);

                    parent.appendChild(p);
                });
            }

            loadAppointments();
        </script>
    </body>
</html>
